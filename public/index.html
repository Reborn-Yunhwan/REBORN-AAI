<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리본 AI 판정기</title>
<style>

:root{--green:#00C473;--green-d:#009E5B;--green-l:#E6FAF3;--navy:#0D1B2A;--gray:#F5F7FA;--border:#E2E8F0;--text:#1A202C;--texts:#4A5568;--textm:#94A3B8;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}
.hd{background:#fff;border-bottom:1px solid var(--border);height:60px;padding:0 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.hd-mark{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:18px}
.hd-name{font-weight:800;font-size:18px;color:var(--navy)}
.hd-name span{color:var(--green)}
.hd-nav{margin-left:auto;display:flex;gap:8px}
.hd-btn{background:#F1F5F9;color:var(--texts);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
.hd-btn:hover{background:var(--green-l);color:var(--green-d);border-color:var(--green)}
.hd-btn.badge{position:relative}
.hd-btn .bcnt{background:#DC2626;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800;margin-left:2px}
.stepbar{background:#fff;border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;overflow-x:auto;gap:0;scrollbar-width:none}
.stepbar::-webkit-scrollbar{display:none}
.si{display:flex;align-items:center;gap:5px;flex-shrink:0}
.sd{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);color:var(--textm);background:#fff;transition:all .25s}
.sd.act{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 0 3px rgba(0,196,115,.2)}
.sd.done{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
.sl{font-size:10px;color:var(--texts);font-weight:500;white-space:nowrap}
.sl.act{color:var(--green-d);font-weight:700}
.sdiv{flex:1;min-width:8px;height:1px;background:var(--border);margin:0 2px}
.pg{max-width:520px;margin:0 auto;padding:22px 16px 80px}
.card{background:#fff;border-radius:var(--r);padding:22px 18px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:13px}
.card-t{font-size:19px;font-weight:800;margin-bottom:5px}
.card-s{font-size:13px;color:var(--texts);line-height:1.6;margin-bottom:18px}
.hero{background:linear-gradient(135deg,var(--navy) 0%,#1a3a52 100%);border-radius:var(--r);padding:34px 22px;color:#fff;text-align:center;margin-bottom:13px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(0,196,115,.12)}
.hero-badge{display:inline-block;background:rgba(0,196,115,.2);border:1px solid rgba(0,196,115,.4);color:#6EF4BE;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;margin-bottom:12px;position:relative;z-index:1}
.hero h1{font-size:22px;font-weight:900;line-height:1.35;margin-bottom:9px;position:relative;z-index:1}
.hero h1 em{color:var(--green);font-style:normal}
.hero p{font-size:12px;color:rgba(255,255,255,.7);line-height:1.6;position:relative;z-index:1;margin-bottom:22px}
.btn-cta{background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px 0;font-size:15px;font-weight:800;cursor:pointer;width:100%;box-shadow:0 4px 14px rgba(0,196,115,.4);transition:all .2s;position:relative;z-index:1}
.btn-cta:hover{background:var(--green-d)}
.btn-link{display:block;background:#fff;color:var(--navy);border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:13px;font-weight:700;text-align:center;text-decoration:none;margin-bottom:9px;cursor:pointer;transition:all .2s;width:100%;font-family:inherit}
.btn-link:hover{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.ic{background:#fff;border-radius:var(--rs);padding:14px 12px;border:1px solid var(--border)}
.ic-ico{font-size:20px;margin-bottom:5px}
.ic h3{font-size:12px;font-weight:700;margin-bottom:2px}
.ic p{font-size:11px;color:var(--texts);line-height:1.4}
.gr-row{background:#fff;border-radius:var(--rs);padding:13px;border:1px solid var(--border);margin-bottom:13px}
.gr-row h3{font-size:12px;font-weight:700;color:var(--texts);margin-bottom:9px}
.gr-badges{display:flex;gap:5px;flex-wrap:wrap}
.gr-badge{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:transform .15s;border:none;font-family:inherit}
.gr-badge:hover{transform:scale(1.05)}
.gr-hint{font-size:10px;color:var(--textm);margin-top:8px;text-align:center}
.frow{margin-bottom:13px}
.flabel{font-size:13px;font-weight:600;color:var(--texts);margin-bottom:5px;display:block}
.finput{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;outline:none;transition:border-color .2s;background:#fff;font-family:inherit}
.finput:focus{border-color:var(--green)}
.fselect{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;outline:none;background:#fff;cursor:pointer;font-family:inherit}
.fselect:focus{border-color:var(--green)}
.ftext{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;outline:none;transition:border-color .2s;background:#fff;font-family:inherit;resize:vertical;min-height:70px}
.ftext:focus{border-color:var(--green)}
.btn-p{background:var(--green);color:#fff;border:none;border-radius:12px;padding:13px 0;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;font-family:inherit}
.btn-p:hover{background:var(--green-d)}
.btn-p:disabled{background:var(--textm);cursor:not-allowed}
.btn-sk{background:#fff;color:var(--texts);border:1.5px solid var(--border);border-radius:12px;padding:11px 0;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .2s;font-family:inherit}
.btn-sk:hover{border-color:var(--green);color:var(--green-d)}
.btn-warn{background:#F59E0B;color:#fff;border:none;border-radius:12px;padding:13px 0;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;font-family:inherit}
.btn-warn:hover{background:#D97706}
.btn-blue{background:#2563EB;color:#fff;border:none;border-radius:12px;padding:13px 0;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;font-family:inherit}
.btn-blue:hover{background:#1D4ED8}
.mc{border:2px solid var(--border);border-radius:var(--rs);padding:16px 14px;cursor:pointer;transition:all .2s;margin-bottom:9px;display:flex;align-items:center;gap:13px}
.mc:hover,.mc.sel{border-color:var(--green);background:var(--green-l)}
.mc-ico{font-size:28px;flex-shrink:0}
.mc-info h4{font-size:13px;font-weight:700;margin-bottom:3px}
.mc-info p{font-size:11px;color:var(--texts);line-height:1.4}
.mc-badge{margin-left:auto;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.notice{background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:var(--rs);padding:13px 14px;margin-bottom:13px;font-size:12px;color:#92400E;line-height:1.6}
.notice strong{color:#78350F;font-weight:800}
.notice-icon{font-size:16px;margin-right:5px}
.uz{border:2px dashed var(--border);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:9px}
.uz:hover{border-color:var(--green);background:var(--green-l)}
.uz-ico{font-size:28px;margin-bottom:5px}
.uz h4{font-size:13px;font-weight:700;margin-bottom:3px}
.uz p{font-size:11px;color:var(--texts)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px}
.pt{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#eee}
.pt img{width:100%;height:100%;object-fit:cover}
.pt-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.pt-add{border:2px dashed #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#aaa;background:#f9f9f9;aspect-ratio:1;border-radius:8px}
.hint{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:9px 11px;font-size:11px;color:#1E40AF;margin-bottom:11px;line-height:1.5}
.subhead{font-size:13px;font-weight:800;color:var(--navy);margin:16px 0 8px;padding-left:6px;border-left:3px solid var(--green)}
.al{border-radius:9px;padding:9px 12px;font-size:12px;margin-bottom:11px;display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.al-info{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.al-warn{background:#FFFBEB;color:#92400E;border:1px solid #FCD34D}
.al-err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.al-ok{background:var(--green-l);color:var(--green-d);border:1px solid var(--green)}
.al-lock{background:#FFF7ED;color:#92400E;border:1.5px solid #F97316;border-radius:10px;padding:13px 15px;font-size:13px;margin-bottom:13px;line-height:1.6}
.ov{position:fixed;inset:0;background:rgba(13,27,42,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;gap:13px}
.spin{width:46px;height:46px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.rg-card{border-radius:var(--r);padding:24px 18px;text-align:center;margin-bottom:13px}
.rg-name{font-size:32px;font-weight:900;margin-bottom:3px}
.rg-ko{font-size:13px;font-weight:600;opacity:.75;margin-bottom:12px}
.rg-conf{display:inline-block;background:rgba(0,0,0,.08);padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700}
.pt-mini{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:13px}
.pt-mini img{width:64px;height:64px;object-fit:cover;border-radius:7px;flex-shrink:0;border:2px solid var(--border)}
.di-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.di-row:last-child{border-bottom:none}
.di-label{color:var(--texts)}
.di-val{font-weight:600;text-align:right;max-width:65%;word-break:break-all}
.imei-val{font-family:monospace;font-size:12px;background:#F8FAFC;padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.ptable{width:100%;border-collapse:collapse}
.ptable tr{border-bottom:1px solid var(--border)}
.ptable tr:last-child{border-bottom:none}
.ptable td{padding:9px 0;font-size:13px}
.ptable td:last-child{text-align:right;font-weight:700}
.jbox{background:var(--gray);border-radius:var(--rs);padding:13px;font-size:12px;color:var(--texts);line-height:1.7;border-left:3px solid var(--green)}
.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.area-item{border-radius:8px;padding:10px 12px;border:1px solid var(--border);font-size:12px}
.area-item-t{font-weight:700;margin-bottom:3px;font-size:11px}
.area-item-s{font-size:11px;color:var(--texts)}
.status-clean{border-left:3px solid var(--green);background:var(--green-l)}
.status-minor{border-left:3px solid #F59E0B;background:#FFFBEB}
.status-notable{border-left:3px solid #EF4444;background:#FEF2F2}
.dp-box{background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:12px;margin-bottom:11px;line-height:1.6}
.dp-step{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px}
.dp-stop{color:var(--green);font-weight:700}
.vbadge{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--green-l);border:1px solid var(--green);border-radius:10px;font-size:13px;font-weight:700;color:var(--green-d);margin-bottom:13px}
.bb{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;z-index:99;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.bb .btn-p{flex:2}
.bb .btn-sk{flex:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.modal{background:#fff;border-radius:var(--r);max-width:440px;width:100%;max-height:88vh;overflow-y:auto;padding:0;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-h{padding:18px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:var(--r) var(--r) 0 0}
.modal-h h3{font-size:16px;font-weight:800}
.modal-x{background:#F1F5F9;border:none;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--texts);display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.modal-b{padding:16px 20px 20px}
.modal-grade{display:inline-block;padding:6px 14px;border-radius:20px;font-size:14px;font-weight:800;margin-bottom:12px}
.modal-desc{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:14px}
.modal-crit{background:var(--gray);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px}
.modal-crit-t{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:6px}
.modal-crit-l{font-size:12px;color:var(--texts);line-height:1.7;padding-left:14px}
.modal-crit-l li{margin-bottom:3px}
.saved-card{background:#fff;border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.04);cursor:pointer;transition:all .2s}
.saved-card:hover{border-color:var(--green);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.saved-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.saved-num{font-family:monospace;font-size:12px;font-weight:800;color:var(--navy);background:var(--gray);padding:3px 8px;border-radius:6px}
.saved-status{font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}
.status-pending{background:#FEF3C7;color:#92400E}
.status-completed{background:var(--green-l);color:var(--green-d)}
.saved-info{display:flex;justify-content:space-between;font-size:11px;color:var(--texts);margin-bottom:6px}
.saved-thumbs{display:flex;gap:4px;overflow-x:auto;padding:6px 0 2px}
.saved-thumbs img{width:44px;height:44px;object-fit:cover;border-radius:5px;border:1px solid var(--border);flex-shrink:0}
.saved-empty{text-align:center;padding:40px 20px;color:var(--textm)}
.saved-empty-i{font-size:36px;margin-bottom:9px}
.saved-empty-t{font-size:13px;font-weight:700;color:var(--texts);margin-bottom:4px}
.saved-empty-s{font-size:11px;color:var(--textm)}
.rvw-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.rvw-btn{border:1.5px solid var(--border);background:#fff;border-radius:10px;padding:10px 0;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--text)}
.rvw-btn:hover{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.rvw-btn.approve{background:var(--green-l);color:var(--green-d);border-color:var(--green)}
.rvw-btn.approve:hover{background:var(--green);color:#fff}
.rvw-btn.change{background:#FEF3C7;color:#92400E;border-color:#F59E0B}
.rvw-btn.change:hover{background:#F59E0B;color:#fff}
.rvw-status{background:var(--green-l);border:1px solid var(--green);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--green-d);font-weight:700;margin-bottom:8px;text-align:center}

</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>

// ── 등급 설정 ──
var GC = {
  Excellent:  {ko:'최상',  color:'#7C3AED', bg:'#F5F3FF', emoji:'✨'},
  'Very Good':{ko:'우수',  color:'#059669', bg:'#ECFDF5', emoji:'💚'},
  Good:       {ko:'양호',  color:'#2563EB', bg:'#EFF6FF', emoji:'💙'},
  Normal:     {ko:'보통',  color:'#D97706', bg:'#FFFBEB', emoji:'🟡'},
  Bad:        {ko:'미흡',  color:'#DC2626', bg:'#FEF2F2', emoji:'🔴'},
  '검수불가': {ko:'검수불가',color:'#64748B',bg:'#F1F5F9', emoji:'⛔'},
};

// ── 등급별 사용자용 설명 ──
var GRADE_DESC = {
  Excellent: {
    desc: '거의 새 제품에 가까운 최상급 상태의 단말기입니다. 외관 손상이 전혀 없거나 확대해야 겨우 보일 정도이며, 화면·후면·베젤 모두 흠집 없는 컨디션이에요.',
    criteria: ['외관 손상 없음 (사용감 최소)', '화면 스크래치·긁힘 없음', '베젤/측면 찍힘 없음', '카메라 렌즈 손상 없음', '배터리 성능 정상 (아이폰 85% 이상)']
  },
  'Very Good': {
    desc: '일상적으로 조심스럽게 사용한 티가 나는 우수한 상태입니다. 미세한 생활기스 정도는 있을 수 있지만 눈에 잘 띄지 않으며, 전체적으로 깨끗한 컨디션이에요.',
    criteria: ['미세한 생활기스 정도만 있음', '눈에 잘 띄지 않는 소소한 흠집', '기능 이상 없음', '베젤 얕은 스크래치 허용', '배터리 성능 양호 (아이폰 80% 이상)']
  },
  Good: {
    desc: '일반적인 사용감이 있는 양호한 상태입니다. 확실히 보이는 스크래치나 소소한 찍힘 등 사용 흔적이 있지만, 사용에는 전혀 지장이 없는 컨디션이에요.',
    criteria: ['눈에 보이는 스크래치 존재', '베젤/측면 소소한 찍힘 있음', '기능 이상 없음', '화면 미세 흠집 있을 수 있음', '카메라 렌즈에 얕은 흠집 허용']
  },
  Normal: {
    desc: '사용 흔적이 뚜렷하게 보이는 보통 상태입니다. 여러 부위에 손상이 있거나 눈에 띄는 스크래치·찍힘 등이 있는 컨디션이에요.',
    criteria: ['여러 부위에 손상 존재', '뚜렷한 스크래치나 찍힘', '화면 가장자리 살짝 황변 가능', '후면 넓은 흠집 가능', '배터리 성능 저하 (아이폰 80% 미만)']
  },

// 이미지 리사이즈 (Vercel 4.5MB 제한 회피 + 판정 속도 향상)
// 긴 변 1600px, JPEG 82% - 화질과 크기 균형
function resizeImage(file, maxSize, quality){
  maxSize = maxSize || 1600;
  quality = quality || 0.82;
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var w = img.width, hh = img.height;
        if(w > maxSize || hh > maxSize){
          if(w > hh){ hh = Math.round(hh * (maxSize/w)); w = maxSize; }
          else { w = Math.round(w * (maxSize/hh)); hh = maxSize; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = hh;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, hh);
        var dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve({
          url: dataUrl,
          b64: dataUrl.split(',')[1],
          mediaType: 'image/jpeg'
        });
      };
      img.onerror = function(){reject(new Error('이미지 로드 실패'));};
      img.src = e.target.result;
    };
    reader.onerror = function(){reject(new Error('파일 읽기 실패'));};
    reader.readAsDataURL(file);
  });
}

// 접수번호 자동 생성 (SMRI-YYMMDD-XXXX)
function genReceiptNumber(){
  var d = new Date();
  var yy = String(d.getFullYear()).slice(2);
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var dd = String(d.getDate()).padStart(2,'0');
  var rand = Math.floor(1000 + Math.random()*9000);
  return 'SMRI-'+yy+mm+dd+'-'+rand;
}

function savePending(list){
  try { localStorage.setItem(PENDING_KEY, JSON.stringify(list)); }

function Upload(props) {
  var s1=useState([]);var basePhotos=s1[0],setBasePhotos=s1[1];
  var s2=useState([]);var extraPhotos=s2[0],setExtraPhotos=s2[1];
  var s4=useState(false);var analyzing=s4[0],setAnalyzing=s4[1];
  var s5=useState('');var err=s5[0],setErr=s5[1];
  var baseRef=useRef(null);
  var extraRef=useRef(null);

  var maxBase = props.method==='mri' ? 16 : 12;
  var maxExtra = 6;

  function addFiles(files, isExtra){
    var arr=Array.from(files).filter(function(f){return f.type.indexOf('image/')===0;});
    var current = isExtra ? extraPhotos : basePhotos;
    var max = isExtra ? maxExtra : maxBase;
    var setter = isExtra ? setExtraPhotos : setBasePhotos;
    if(current.length+arr.length>max){setErr((isExtra?'추가 첨부':'단말기 기본 사진')+' 최대 '+max+'장까지 업로드 가능합니다.');return;}
    setErr('');
    // 자동 리사이즈: 큰 사진도 판정 가능
    arr.forEach(function(file){
      resizeImage(file, 1600, 0.82).then(function(res){
        setter(function(prev){return prev.concat([{
          file: {type: res.mediaType, name: file.name},
          url: res.url,
          b64: res.b64
        }]);});
      }).catch(function(e){setErr('이미지 처리 오류: '+e.message);});
    });
  }

  function go(){
    var allPhotos = basePhotos.concat(extraPhotos);
    if(!allPhotos.length){setErr('단말기 기본 사진을 1장 이상 업로드해주세요.');return;}
    setErr('');setAnalyzing(true);
    fetch('/api/grade',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({images:allPhotos.map(function(p){return {media_type:p.file.type,data:p.b64};}),method:props.method}),
    })
    .then(function(res){return res.json().then(function(d){return {ok:res.ok,data:d};});})
    .then(function(r){
      if(!r.ok) throw new Error(r.data.error||'판정 오류');
      props.onResult(r.data,allPhotos);
    })
    .catch(function(e){setErr('판정 오류: '+e.message);})
    .finally(function(){setAnalyzing(false);});
  }

  function renderGrid(photos, setter, ref, max, isExtra){
    if(photos.length>0){
      var cells=photos.map(function(p,i){
        return h('div',{key:i,className:'pt'},

      return h('div',{className:'pgrid'},cells);

    return h('div',{className:'uz',
      onClick:function(){ref.current&&ref.current.click();},
      onDrop:function(e){e.preventDefault();addFiles(e.dataTransfer.files,isExtra);},
      onDragOver:function(e){e.preventDefault();}
    },
      h('div',{className:'uz-ico'},isExtra?'📎':'📷'),
      h('h4',null,isExtra?'추가로 첨부할 사진이 있으신가요?':'사진을 끌어다 놓거나 클릭하여 선택'),
      h('p',null,'JPG, PNG 지원 · 최대 '+max+'장')
    );
  }

  return h('div',{className:'pg',style:{paddingBottom:'90px'}},
    analyzing&&h('div',{className:'ov'},
      h('div',{className:'spin'}),
      h('div',{style:{fontSize:'15px',fontWeight:'700'}},'AI가 사진을 분석하고 있습니다'),
      h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,.6)'}},'잠시만 기다려주세요 (약 10~30초)')
    ),
    h('div',{className:'card'},
      h('div',{className:'card-t'},'사진 업로드'),
      h('div',{className:'card-s'},(props.method==='mri'?'🔬 MRI기기 촬영':'📱 직접 촬영')),
      h('div',{className:'hint'},'💡 전면(화면), 후면, 측면(4방향), 카메라, 기기정보(설정→일반→정보) 화면을 포함하면 IMEI·배터리까지 자동 추출됩니다.'),

      h('div',{className:'subhead'},'단말기 기본 사진 ('+basePhotos.length+'/'+maxBase+')'),
      renderGrid(basePhotos,setBasePhotos,baseRef,maxBase,false),
      h('input',{type:'file',ref:baseRef,accept:'image/*',multiple:true,style:{display:'none'},onChange:function(e){addFiles(e.target.files,false);}}),

      h('div',{className:'subhead'},'추가 첨부 (선택 · '+extraPhotos.length+'/'+maxExtra+')'),
      h('div',{style:{fontSize:'11px',color:'#64748B',marginBottom:'8px',paddingLeft:'6px'}},'구성품, 영수증, 손상 근접사진 등 참고 자료를 추가할 수 있어요.'),

// ── 미완료 접수 목록 페이지 (변경 3번 하위 기능) ──
function PendingList(props) {
  var s1 = useState(loadPending());
  var list = s1[0], setList = s1[1];

  function refresh(){ setList(loadPending()); }

  function del(receiptNumber, e){
    e.stopPropagation();
    if(confirm('접수번호 '+receiptNumber+'을(를) 삭제하시겠습니까?')){
      removePending(receiptNumber);
      refresh();
    }
  }

  function fmtDate(iso){
    try {
      var d = new Date(iso);
      var mm = String(d.getMonth()+1).padStart(2,'0');
      var dd = String(d.getDate()).padStart(2,'0');
      var hh = String(d.getHours()).padStart(2,'0');
      var mi = String(d.getMinutes()).padStart(2,'0');
      return mm+'/'+dd+' '+hh+':'+mi;
    } catch(e){ return ''; }
  }

  return h('div',{className:'pg'},
    h('div',{className:'card',style:{marginBottom:'13px'}},
      h('div',{className:'card-t'},'📋 미완료 접수함'),
      h('div',{className:'card-s',style:{marginBottom:'0'}},
        '본인인증을 마치지 못한 접수 건들을 여기서 이어서 진행할 수 있어요.'

    list.length===0 ?
      h('div',{className:'card'},
        h('div',{className:'saved-empty'},
          h('div',{className:'saved-empty-i'},'📭'),
          h('div',{className:'saved-empty-t'},'미완료 접수가 없습니다'),
          h('div',{className:'saved-empty-s'},'접수 진행 중 임시저장하면 여기에 표시됩니다')
        )
      )
    :
      list.map(function(item){
        var grade = item.result && item.result.final_grade;
        var gcfg = grade && GC[grade];
        return h('div',{key:item.receiptNumber,className:'saved-card',onClick:function(){props.onOpen(item);}},
          h('div',{className:'saved-h'},
            h('div',{className:'saved-num'}, item.receiptNumber),
            h('div',{className:'saved-status status-'+(item.status||'pending')},
              item.status==='completed'?'검수완료':'본인인증 대기'

            gcfg && h('span',{style:{color:gcfg.color,fontWeight:'800'}},gcfg.emoji+' '+grade)

          ),

            h('button',{className:'btn-p',style:{padding:'9px 0',fontSize:'12px'},
              onClick:function(e){e.stopPropagation();props.onOpen(item);}},

// ── 등급 변경 모달 ──
function GradeChangeModal(props) {
  var s1 = useState(props.currentGrade);

  var reason = s2[0], setReason = s2[1];

    if(!newGrade){setErr('변경할 등급을 선택해주세요.');return;}
    if(newGrade===props.currentGrade){setErr('현재 등급과 다른 등급을 선택해주세요.');return;}
    if(!reason.trim() || reason.trim().length<5){setErr('변경 사유를 5자 이상 입력해주세요.');return;}
    props.onConfirm(newGrade, reason.trim());

    h('div',{className:'modal',onClick:function(e){e.stopPropagation();}},
      h('div',{className:'modal-h'},

          h('label',{className:'flabel'},'변경할 등급'),
          h('select',{className:'fselect',value:newGrade,onChange:function(e){setNewGrade(e.target.value);}},
            h('option',{value:''},'등급 선택'),
            Object.entries(GC).map(function(e){

          )
        ),
        h('div',{className:'frow'},
          h('label',{className:'flabel'},'변경 사유'),
          h('textarea',{className:'ftext',placeholder:'예: 후면 하단 모서리에 육안으로 뚜렷하게 보이는 찍힘이 있어 Normal로 하향',

// ── 메인 앱 ──
// view: 'flow' | 'pending'
// step (flow일 때): 0=landing, 1=method, 2=upload, 3=auth, 4=result
function App() {
  var s0=useState('flow');var view=s0[0],setView=s0[1];
  var s1=useState(0);var step=s1[0],setStep=s1[1];
  var s2=useState(null);var method=s2[0],setMethod=s2[1];
  var s3=useState(null);var result=s3[0],setResult=s3[1];
  var s4=useState([]);var photos=s4[0],setPhotos=s4[1];
  var s5=useState(null);var authFinal=s5[0],setAuthFinal=s5[1];
  var s6=useState(null);var receiptNumber=s6[0],setReceiptNumber=s6[1];
  var s7=useState(null);var savedAuthInfo=s7[0],setSavedAuthInfo=s7[1];

  function restart(){
    setView('flow');
    setStep(0);
    setMethod(null);
    setResult(null);
    setPhotos([]);
    setAuthFinal(null);
    setReceiptNumber(null);
    setSavedAuthInfo(null);
  }

  function goHome(){ restart(); }
  function goPending(){ setView('pending'); }

  function openPendingItem(item){
    // 저장된 접수 건 이어하기: 사진 복원, 판정 결과 복원 후 본인인증 단계로
    setReceiptNumber(item.receiptNumber);
    setMethod(item.method);
    setResult(item.result);
    setSavedAuthInfo(item.authInfo);
    // 저장된 photos 형태를 프론트 형태로 복원
    var restoredPhotos = (item.photos||[]).map(function(p,i){
      return {
        url: p.url,
        b64: p.b64,
        file: {type: p.mediaType||'image/jpeg', name:'photo_'+i}
      };
    });
    setPhotos(restoredPhotos);
    setView('flow');
    setStep(3); // 본인인증 단계로 이동
  }

  // 미완료 접수함 뷰
  if(view==='pending'){
    return h('div',null,
      h(Header,{onGoHome:goHome,onGoPending:goPending}),
      h(PendingList,{onOpen:openPendingItem,onGoHome:goHome})
    );
  }

  // 일반 플로우 뷰
  return h('div',null,
    h(Header,{onGoHome:goHome,onGoPending:goPending}),
    step>0 && h(StepBar,{cur:step}),
    step===0 && h(Landing,{onNext:function(){setStep(1);}}),
    step===1 && h(Method,{onSelect:function(m){setMethod(m);setStep(2);}}),
    step===2 && h(Upload,{method:method,onResult:function(r,p){
      setResult(r);
      setPhotos(p);
      // 접수번호가 없으면 이 시점에 생성
      if(!receiptNumber) setReceiptNumber(genReceiptNumber());
      setStep(3);
    }}),
    step===3 && h(Auth,{
      photos: photos,
      method: method,
      result: result,
      receiptNumber: receiptNumber,
      savedInfo: savedAuthInfo,
      onDone: function(info){
        setAuthFinal(info);
        // 저장돼 있던 임시저장 건은 completed 처리
        if(receiptNumber){
          var list = loadPending();
          list.forEach(function(item){
            if(item.receiptNumber===receiptNumber){
              item.status='in_review';
              item.authInfo=info;
            }
          });
          savePending(list);
        }
        setStep(4);
      },
      onGoHome: goHome,
      onGoPending: goPending
    }),
    step===4 && h(Result,{
      result: result,
      photos: photos,
      authInfo: authFinal,
      receiptNumber: receiptNumber,
      onRestart: restart
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));

</script>
</body>
</html>
